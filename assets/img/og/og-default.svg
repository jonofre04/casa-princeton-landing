<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A4063"/>
      <stop offset="60%" stop-color="#1B2E4A"/>
      <stop offset="100%" stop-color="#0F1E33"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.75" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#E2CFA1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E2CFA1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#E2CFA1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative gold frame -->
  <rect x="60" y="60" width="1080" height="510" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.55"/>

  <!-- CP monogram circle -->
  <g transform="translate(600 230)">
    <circle r="78" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <text x="0" y="22" text-anchor="middle" font-family="Georgia, 'Cormorant Garamond', serif" font-size="74" font-weight="700" fill="#F8F4EC">CP</text>
  </g>

  <!-- Brand name -->
  <text x="600" y="380" text-anchor="middle" font-family="Georgia, 'Cormorant Garamond', serif" font-size="72" font-weight="600" fill="#F8F4EC" letter-spacing="2">Casa Princeton</text>

  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#E2CFA1" letter-spacing="6">LUXURY APARTMENTS · PRINCETON, FLORIDA</text>

  <!-- Stats row -->
  <g font-family="Inter, system-ui, sans-serif" fill="#F8F4EC">
    <text x="350" y="510" text-anchor="middle" font-size="32" font-weight="700">1–3 BR</text>
    <text x="350" y="540" text-anchor="middle" font-size="13" letter-spacing="2" fill="#A8B5C7">FLOOR PLANS</text>

    <text x="600" y="510" text-anchor="middle" font-size="32" font-weight="700">$1,885+</text>
    <text x="600" y="540" text-anchor="middle" font-size="13" letter-spacing="2" fill="#A8B5C7">STARTING / MO</text>

    <text x="850" y="510" text-anchor="middle" font-size="32" font-weight="700">2025</text>
    <text x="850" y="540" text-anchor="middle" font-size="13" letter-spacing="2" fill="#A8B5C7">BRAND NEW</text>
  </g>

  <!-- Bottom accent -->
  <line x1="500" y1="465" x2="700" y2="465" stroke="url(#gold)" stroke-width="2"/>
</svg>
